<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vini AI - Chat, Agents & API Marketplace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --bg-main: #0a0e27;
            --bg-secondary: #1a1f3a;
            --bg-tertiary: #252d48;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
        }

        body {
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: linear-gradient(to right, var(--bg-secondary), #1a2f4a);
            border-bottom: 1px solid var(--border);
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            padding: 8px 0;
        }

        nav button:hover, nav button.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }

        .header-right {
            display: flex;
            gap: 12px;
        }

        .header-btn {
            padding: 8px 16px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: rgba(99, 102, 241, 0.2);
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .page {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .page.active {
            display: flex;
        }

        .chat-container {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 20px;
            overflow: hidden;
        }

        .chat-sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .chat-sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 14px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .message.assistant .message-bubble {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .input-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .model-select {
            padding: 8px 12px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group textarea {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            max-height: 120px;
        }

        .input-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: translateY(-2px);
        }

        .send-btn:disabled {
            opacity: 0.5;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            height: 100%;
        }

        .welcome-header h2 {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .welcome-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .model-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .model-card {
            padding: 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .model-card:hover {
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.2);
        }

        .model-card strong {
            color: var(--primary);
            display: block;
            margin-bottom: 4px;
        }

        .model-card small {
            color: var(--text-muted);
            font-size: 12px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 24px;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.4);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="header-left">
                <div class="logo">🤖 Vini AI</div>
                <nav id="main-nav">
                    <button class="nav-btn active" data-page="chat">💬 Chat</button>
                </nav>
            </div>
            <div class="header-right">
                <button class="header-btn" id="copy-api">📋 Copy Key</button>
                <button class="header-btn" onclick="openSettings()">⚙️ Settings</button>
            </div>
        </header>

        <div class="main">
            <div id="chat-page" class="page active">
                <div class="chat-container">
                    <div class="chat-sidebar">
                        <div class="chat-sidebar-header">
                            <button class="new-chat-btn" id="new-chat">+ New Chat</button>
                        </div>
                    </div>

                    <div class="chat-main">
                        <div class="messages-area" id="messages">
                            <div class="welcome-screen">
                                <div class="welcome-header">
                                    <h2>Welcome to Vini AI</h2>
                                    <p>Start a conversation with any model</p>
                                </div>
                                <div class="model-grid">
                                    <div class="model-card" onclick="selectModel('tinyllama')">
                                        <strong>🚀 TinyLlama</strong>
                                        <small>Fast</small>
                                    </div>
                                    <div class="model-card" onclick="selectModel('mistral')">
                                        <strong>✨ Mistral</strong>
                                        <small>Balanced</small>
                                    </div>
                                    <div class="model-card" onclick="selectModel('llama3:instruct')">
                                        <strong>🔥 Llama3</strong>
                                        <small>Powerful</small>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="input-area">
                            <div class="input-controls">
                                <select id="model-select" class="model-select">
                                    <option value="tinyllama">TinyLlama</option>
                                    <option value="mistral">Mistral 7B</option>
                                    <option value="llama3:instruct">Llama3 Instruct</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <textarea id="chat-input" placeholder="Ask anything..."></textarea>
                                <button class="send-btn" id="send-chat">➤</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Settings</h2>
                <button class="close-btn" onclick="closeSettings()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Backend API URL</label>
                    <input type="text" id="api-url-input" placeholder="https://your-backend.up.railway.app">
                </div>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="text" id="api-key-input" value="demo-key-123">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeSettings()">Cancel</button>
                <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "demo-key-123";
        const BASE_URL = localStorage.getItem('apiUrl') || window.location.origin;
        let currentModel = "tinyllama";

        document.getElementById('send-chat').addEventListener('click', sendMessage);
        document.getElementById('chat-input').addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('copy-api').addEventListener('click', () => {
            navigator.clipboard.writeText(API_KEY);
            const btn = document.getElementById('copy-api');
            btn.textContent = '✓ Copied!';
            setTimeout(() => btn.textContent = '📋 Copy Key', 2000);
        });

        document.getElementById('new-chat').addEventListener('click', () => {
            document.getElementById('messages').innerHTML = `
                <div class="welcome-screen">
                    <div class="welcome-header">
                        <h2>New Chat</h2>
                        <p>Start a conversation</p>
                    </div>
                </div>
            `;
        });

        function selectModel(model) {
            currentModel = model;
            document.getElementById('model-select').value = model;
            document.getElementById('messages').innerHTML = '';
            document.getElementById('chat-input').focus();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            const model = document.getElementById('model-select').value;
            input.value = '';

            const messagesArea = document.getElementById('messages');
            if (messagesArea.querySelector('.welcome-screen')) {
                messagesArea.innerHTML = '';
            }

            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div>`;
            messagesArea.appendChild(userDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;

            try {
                const apiUrl = localStorage.getItem('apiUrl') || window.location.origin;
                const res = await fetch(`${apiUrl}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': API_KEY
                    },
                    body: JSON.stringify({ prompt: text, model })
                });

                const data = await res.json();
                const assistantDiv = document.createElement('div');
                assistantDiv.className = 'message assistant';
                assistantDiv.innerHTML = `<div class="message-bubble">${escapeHtml(data.reply || data.error)}</div>`;
                messagesArea.appendChild(assistantDiv);
                messagesArea.scrollTop = messagesArea.scrollHeight;
            } catch (e) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message assistant';
                errorDiv.innerHTML = `<div class="message-bubble" style="color:#fca5a5;">Error: ${e.message}</div>`;
                messagesArea.appendChild(errorDiv);
            }
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function openSettings() {
            document.getElementById('api-url-input').value = localStorage.getItem('apiUrl') || '';
            document.getElementById('settings-modal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.remove('active');
        }

        function saveSettings() {
            const url = document.getElementById('api-url-input').value;
            if (url) localStorage.setItem('apiUrl', url);
            closeSettings();
            location.reload();
        }

        // Load settings on startup
        document.getElementById('api-url-input').value = localStorage.getItem('apiUrl') || '';
    </script>
</body>
</html>
